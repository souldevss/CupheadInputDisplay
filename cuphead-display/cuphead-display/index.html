<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <header id="controls">
            <aside id="binds-tab">
                <h2>Keyboard</h2>

                <div class="bind-row">
                    <span>Jump</span>
                    <input id="bind-jump" value="Z">
                </div>

                <div class="bind-row">
                    <span>Shoot</span>
                    <input id="bind-shoot" value="X">
                </div>

                <div class="bind-row">
                    <span>Dash</span>
                    <input id="bind-dash" value="C">
                </div>

                <div class="bind-row">
                    <span>EX</span>
                    <input id="bind-ex" value="V">
                </div>

                <div class="bind-row">
                    <span>Lock</span>
                    <input id="bind-lock" value="A">
                </div>

                <div class="bind-row">
                    <span>Swap</span>
                    <input id="bind-swap" value="S">
                </div>

                <div class="bind-row">
                    <span>Up</span>
                    <input id="bind-up" value="↑">
                </div>

                <div class="bind-row">
                    <span>Down</span>
                    <input id="bind-down" value="↓">
                </div>

                <div class="bind-row">
                    <span>Left</span>
                    <input id="bind-left" value="←">
                </div>

                <div class="bind-row">
                    <span>Right</span>
                    <input id="bind-right" value="→">
                </div>

                <hr>

                <h2>Gamepad</h2>

                <div class="bind-row">
                    <span>Jump</span>
                    <button id="gp-jump" onclick="listenGamepad('jump')">A</button>
                </div>

                <div class="bind-row">
                    <span>Shoot</span>
                    <button id="gp-shoot" onclick="listenGamepad('shoot')">X</button>
                </div>

                <div class="bind-row">
                    <span>Dash</span>
                    <button id="gp-dash" onclick="listenGamepad('dash')">B</button>
                </div>

                <div class="bind-row">
                    <span>EX</span>
                    <button id="gp-ex" onclick="listenGamepad('ex')">Y</button>
                </div>

                <div class="bind-row">
                    <span>Lock</span>
                    <button id="gp-lock" onclick="listenGamepad('lock')">LB</button>
                </div>

                <div class="bind-row">
                    <span>Swap</span>
                    <button id="gp-swap" onclick="listenGamepad('swap')">RB</button>
                </div>
            </aside>
        </header>

        <main id="display">
            <div id="left-side">
                <div class="misc-slot">
                    <img id="lock" class="misc" src="assets/Unpressed/Misc/Lock.png" alt="">
                </div>

                <div class="misc-slot">
                    <img id="swap" class="misc" src="assets/Unpressed/Misc/Swap.png" alt="">
                </div>
            </div>

            <div id="character-buttons">
                <div class="button-slot">
                    <img id="jump" class="button" alt="">
                </div>

                <div class="button-slot">
                    <img id="shoot" class="button" alt="">
                </div>

                <div class="button-slot">
                    <img id="dash" class="button" alt="">
                </div>

                <div class="button-slot">
                    <img id="ex" class="button" alt="">
                </div>
            </div>

            <div id="dpad">
                <img id="up" class="arrow" src="assets/Unpressed/Misc/Arrow_up.png" alt="">
                <img id="left" class="arrow" src="assets/Unpressed/Misc/Arrow_left.png" alt="">
                <img id="right" class="arrow" src="assets/Unpressed/Misc/Arrow_right.png" alt="">
                <img id="down" class="arrow" src="assets/Unpressed/Misc/Arrow_down.png" alt="">
            </div>
        </main>

        <div id="bottom-bar">
            <button id="config-toggle" class="config-btn" type="button" onclick="toggleConfig()" title="Show or hide configuration" aria-pressed="true">
                <img src="assets/config.png" alt="Config">
            </button>

            <nav id="character-select">
                <button type="button" class="char-btn" data-character="Cuphead" onclick="changeCharacter('Cuphead')" title="Cuphead">
                    <img src="assets/Cuphead.png" alt="Cuphead">
                </button>
                <button type="button" class="char-btn" data-character="Chalice" onclick="changeCharacter('Chalice')" title="Chalice">
                    <img src="assets/Chalice.png" alt="Chalice">
                </button>
                <button type="button" class="char-btn" data-character="Mugman" onclick="changeCharacter('Mugman')" title="Mugman">
                    <img src="assets/Mugman.png" alt="Mugman">
                </button>
            </nav>

            <button id="plane-toggle" class="plane-btn" type="button" onclick="togglePlaneMode()" title="Plane mode off">
                <img id="plane-switch-img" src="assets/switch_off.png" alt="Plane mode" width = 65>
            </button>
        </div>
    </div>

    <script src="binds.js"></script>
    <script src="script.js"></script>
</body>
</html>
