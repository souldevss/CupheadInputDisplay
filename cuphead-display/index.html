<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <title>Input Display</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- ABA PERSONAGENS -->
    <div id="character-tab">

        <button onclick="changeCharacter('Chalice')">
            Chalice
        </button>

        <button onclick="changeCharacter('Cuphead')">
            Cuphead
        </button>

        <button onclick="changeCharacter('Mugman')">
            Mugman
        </button>

    </div>

    <!-- ABA BINDS -->
    <div id="binds-tab">

        <h2>Keyboard</h2>

        <div class="bind-row">
            <span>Jump</span>
            <input id="bind-jump" value="Z">
        </div>

        <div class="bind-row">
            <span>Shoot</span>
            <input id="bind-shoot" value="X">
        </div>

        <div class="bind-row">
            <span>Dash</span>
            <input id="bind-dash" value="C">
        </div>

        <div class="bind-row">
            <span>EX</span>
            <input id="bind-ex" value="V">
        </div>

        <div class="bind-row">
            <span>Lock</span>
            <input id="bind-lock" value="A">
        </div>

        <div class="bind-row">
            <span>Swap</span>
            <input id="bind-swap" value="S">
        </div>

        <div class="bind-row">
            <span>Up</span>
            <input id="bind-up" value="↑">
        </div>

        <div class="bind-row">
            <span>Down</span>
            <input id="bind-down" value="↓">
        </div>

        <div class="bind-row">
            <span>Left</span>
            <input id="bind-left" value="←">
        </div>

        <div class="bind-row">
            <span>Right</span>
            <input id="bind-right" value="→">
        </div>

        <hr>

        <h2>Gamepad</h2>

        <div class="bind-row">
            <span>Jump</span>
            <button id="gp-jump"
            onclick="listenGamepad('jump')">
                A
            </button>
        </div>

        <div class="bind-row">
            <span>Shoot</span>
            <button id="gp-shoot"
            onclick="listenGamepad('shoot')">
                X
            </button>
        </div>

        <div class="bind-row">
            <span>Dash</span>
            <button id="gp-dash"
            onclick="listenGamepad('dash')">
                B
            </button>
        </div>

        <div class="bind-row">
            <span>EX</span>
            <button id="gp-ex"
            onclick="listenGamepad('ex')">
                Y
            </button>
        </div>

        <div class="bind-row">
            <span>Lock</span>
            <button id="gp-lock"
            onclick="listenGamepad('lock')">
                LB
            </button>
        </div>

        <div class="bind-row">
            <span>Swap</span>
            <button id="gp-swap"
            onclick="listenGamepad('swap')">
                RB
            </button>
        </div>

    </div>

    <!-- DISPLAY -->
    <div id="display">

        <!-- ESQUERDA -->
        <div id="left-side">

            <div class="misc-slot">
                <img id="lock" class="misc"
                src="assets/Unpressed/Misc/Lock.png">
            </div>

            <div class="misc-slot">
                <img id="swap" class="misc"
                src="assets/Unpressed/Misc/Swap.png">
            </div>

        </div>

        <!-- PERSONAGEM -->
        <div id="character-buttons">

            <div class="button-slot">
                <img id="jump" class="button">
            </div>

            <div class="button-slot">
                <img id="shoot" class="button">
            </div>

            <div class="button-slot">
                <img id="dash" class="button">
            </div>

            <div class="button-slot">
                <img id="ex" class="button">
            </div>

        </div>

        <!-- DPAD -->
        <div id="dpad">

            <img id="up" class="arrow"
            src="assets/Unpressed/Misc/Arrow_up.png">

            <img id="left" class="arrow"
            src="assets/Unpressed/Misc/Arrow_left.png">

            <img id="right" class="arrow"
            src="assets/Unpressed/Misc/Arrow_right.png">

            <img id="down" class="arrow"
            src="assets/Unpressed/Misc/Arrow_down.png">

        </div>

    </div>

    <script src="binds.js"></script>
    <script src="script.js"></script>

</body>
</html>
